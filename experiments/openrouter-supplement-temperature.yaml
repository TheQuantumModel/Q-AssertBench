name: openrouter-supplement-temperature
client: openai-compatible

api:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY

defaults:
  tasks_root: benchmark_data/tasks
  output_dir: experiment_data/generated_instances/openrouter-supplement-temperature
  temperature: 1.0
  max_output_tokens: 2048
  trials: 10
  concurrency: 5

task_selection:
  mode: all
  task_ids: []

models:
  - model_id: openai/gpt-5.4
    run_id: openai/gpt-5.4-temp1.0
    temperature: 1.0
  - model_id: openai/gpt-5.4
    run_id: openai/gpt-5.4-temp0.2
    temperature: 0.2
  - model_id: google/gemini-3.1-pro-preview
    run_id: google/gemini-3.1-pro-preview-temp1.0
    temperature: 1.0
  - model_id: google/gemini-3.1-pro-preview
    run_id: google/gemini-3.1-pro-preview-temp0.2
    temperature: 0.2
  - model_id: x-ai/grok-4
    run_id: x-ai/grok-4-temp1.0
    temperature: 1.0
  - model_id: x-ai/grok-4
    run_id: x-ai/grok-4-temp0.2
    temperature: 0.2
